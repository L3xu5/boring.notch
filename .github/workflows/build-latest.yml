name: Build latest

# Builds the app on every push to main (including the automatic upstream syncs) and
# republishes it as the rolling "latest" release. Combined with the Homebrew cask
# (version :latest), this means `brew` always installs the current build and no version
# numbers ever have to be bumped by hand.

on:
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: build-latest
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Build (Release, unsigned)
        run: |
          set -o pipefail
          xcodebuild \
            -project boringNotch.xcodeproj \
            -scheme boringNotch \
            -configuration Release \
            -destination 'generic/platform=macOS' \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO \
            build

      - name: Package app
        run: ditto -c -k --keepParent "build/Build/Products/Release/boringNotch.app" boringNotch.zip

      - name: Publish rolling 'latest' release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          notes="Auto-built from \`main\` (${GITHUB_SHA::7}).

          Unsigned build — after installing, clear quarantine once:
          \`\`\`bash
          xattr -dr com.apple.quarantine /Applications/boringNotch.app
          \`\`\`
          (The Homebrew cask does this automatically.)"
          gh release delete latest --cleanup-tag --yes 2>/dev/null || true
          gh release create latest boringNotch.zip \
            --title "Latest build" \
            --notes "$notes" \
            --target "$GITHUB_SHA"
