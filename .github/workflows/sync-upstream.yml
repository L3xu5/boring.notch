name: Sync with upstream

# Keeps this fork up to date with TheBoredTeam/boring.notch by merging upstream/main
# on a schedule. The fork's own commits are preserved (README.md is kept via the
# merge=ours driver in .gitattributes). If a merge needs human conflict resolution,
# an issue is opened instead of pushing a broken tree.

on:
  schedule:
    - cron: "0 6 * * *" # daily at 06:00 UTC
  workflow_dispatch: {}

permissions:
  contents: write
  issues: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # Enables the `merge=ours` driver declared in .gitattributes (keeps our README.md).
          git config merge.ours.driver true

      - name: Merge upstream/main
        id: sync
        run: |
          git remote add upstream https://github.com/TheBoredTeam/boring.notch.git
          git fetch --no-tags upstream main
          before="$(git rev-parse HEAD)"
          if git merge --no-edit upstream/main; then
            if [ "$before" = "$(git rev-parse HEAD)" ]; then
              echo "status=uptodate" >> "$GITHUB_OUTPUT"
              echo "Already up to date with upstream."
            else
              echo "status=merged" >> "$GITHUB_OUTPUT"
              echo "Merged upstream/main."
            fi
          else
            git merge --abort || true
            echo "status=conflict" >> "$GITHUB_OUTPUT"
            echo "Merge conflict — leaving main untouched."
          fi

      - name: Push merged changes
        if: steps.sync.outputs.status == 'merged'
        run: git push origin HEAD:main

      - name: Open an issue on conflict
        if: steps.sync.outputs.status == 'conflict'
        uses: actions/github-script@v7
        with:
          script: |
            const title = "⚠️ Upstream sync needs a manual merge";
            const { owner, repo } = context.repo;
            const open = await github.paginate(github.rest.issues.listForRepo, {
              owner, repo, state: "open", per_page: 100,
            });
            if (open.some(i => i.title === title)) {
              core.info("Conflict issue already open — not duplicating.");
              return;
            }
            await github.rest.issues.create({
              owner, repo, title,
              body: [
                "The scheduled sync from `TheBoredTeam/boring.notch` hit a merge conflict that needs manual resolution.",
                "",
                "```bash",
                "git remote add upstream https://github.com/TheBoredTeam/boring.notch.git  # once",
                "git fetch upstream main",
                "git merge upstream/main   # resolve the conflicts",
                "git push origin main",
                "```",
                "",
                "_This issue won't be reopened while it stays open._",
              ].join("\n"),
            });
